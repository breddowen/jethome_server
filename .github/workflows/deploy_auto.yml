# ./.github/workflows/deploy.yml
name: Build and Deploy to JetHub

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/breddowen/jethome-backend
  FRONTEND_IMAGE: ghcr.io/breddowen/jethome-frontend

jobs:
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max

  deploy:
    name: Deploy to JetHub
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.JETHUB_HOST }}
          username: ${{ secrets.JETHUB_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            
            echo "🚀 Starting deployment..."
            
            # Создание директории
            mkdir -p /opt/jethome_server/deploy
            cd /opt/jethome_server/deploy
            
            # Логин в GitHub Container Registry
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u breddowen --password-stdin
            
            # Остановка старых контейнеров
            echo "⏹️  Stopping old containers..."
            docker-compose down || true
            
            # Удаление старых образов
            echo "🗑️  Removing old images..."
            docker rmi ghcr.io/breddowen/jethome-backend:latest || true
            docker rmi ghcr.io/breddowen/jethome-frontend:latest || true
            
            # Загрузка новых образов
            echo "📥 Pulling new images..."
            docker pull ghcr.io/breddowen/jethome-backend:latest
            docker pull ghcr.io/breddowen/jethome-frontend:latest
            
            # Запуск новых контейнеров
            echo "▶️  Starting new containers..."
            docker-compose up -d
            
            # Проверка статуса
            echo "✅ Checking status..."
            sleep 10
            docker-compose ps
            
            # Очистка
            echo "🧹 Cleaning up..."
            docker image prune -f
            
            echo "🎉 Deployment completed!"

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.JETHUB_HOST }}
          username: ${{ secrets.JETHUB_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/docker-compose.yml,deploy/nginx.conf"
          target: "/opt/jethome_server/"
          strip_components: 0

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          sleep 10
          
          # Проверка backend
          if curl -f --connect-timeout 10 http://${{ secrets.JETHUB_HOST }}:8000/health; then
            echo "✅ Backend is healthy"
          else
            echo "⚠️ Backend health check failed (might need more time)"
          fi
          
          # Проверка frontend
          if curl -f --connect-timeout 10 http://${{ secrets.JETHUB_HOST }}; then
            echo "✅ Frontend is accessible"
          else
            echo "⚠️ Frontend is not accessible (might need more time)"
          fi