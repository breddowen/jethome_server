# ./.github/workflows/deploy.yml
name: Deploy to JetHub

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add JetHub to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.JETHUB_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to JetHub
        env:
          JETHUB_HOST: ${{ secrets.JETHUB_HOST }}
          JETHUB_USER: ${{ secrets.JETHUB_USER }}
        run: |
          ssh $JETHUB_USER@$JETHUB_HOST << 'EOF'
            cd /opt/jethome_server || exit 1
            
            # Pull latest code
            git pull origin main
            
            # Stop services
            cd deploy
            docker-compose down
            
            # Build and start
            docker-compose build --no-cache
            docker-compose up -d
            
            # Check health
            sleep 10
            docker-compose ps
            
            echo "Deployment completed!"
          EOF

      - name: Verify deployment
        env:
          JETHUB_HOST: ${{ secrets.JETHUB_HOST }}
        run: |
          curl -f http://$JETHUB_HOST/health || exit 1
          echo "Health check passed!"